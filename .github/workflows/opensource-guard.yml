name: opensource-guard

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  opensource-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine base ref
        id: base
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT" ;;
            push)
              echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT" ;;
            *)
              # workflow_dispatch or anything else: no base -> full-tree scan
              echo "ref=__none__" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run open-source guard
        run: bash scripts/check-opensource.sh "${{ steps.base.outputs.ref }}"
